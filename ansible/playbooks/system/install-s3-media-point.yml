---
- name: Mount media bucket
  hosts: media
  become: true
  vars:
    s3_bucket_name: "{{ lookup('env', 'S3_MEDIA_BUCKET') | default('') }}"
    s3_endpoint: "{{ lookup('env', 'S3_MEDIA_ENDPOINT') | default('') }}"
    aws_access_key_id: "{{ lookup('env', 'S3_MEDIA_ACCESS_KEY_ID') | default('') }}"
    aws_secret_access_key: "{{ lookup('env', 'S3_MEDIA_APPLICATION_KEY') | default('') }}"
    mount_point: "/mnt/s3/media"
    s3fs_config_file: "/etc/passwd-s3fs"

  tasks:
    - name: Validate required env vars
      ansible.builtin.assert:
        that:
          - s3_bucket_name | length > 0
          - s3_endpoint | length > 0
          - aws_access_key_id | length > 0
          - aws_secret_access_key | length > 0
        fail_msg: "Required environment variables are not set. Check that S3_MEDIA_BUCKET, S3_MEDIA_ENDPOINT, S3_MEDIA_ACCESS_KEY_ID, and S3_MEDIA_APPLICATION_KEY are defined."

    - name: Install required packages
      ansible.builtin.package:
        name:
          - s3fs
        state: present

    - name: Ensure mount point exists
      ansible.builtin.file:
        path: "{{ mount_point }}"
        state: directory

    - name: Create s3fs credentials file
      ansible.builtin.copy:
        dest: "{{ s3fs_config_file }}"
        content: |
          {{ aws_access_key_id }}:{{ aws_secret_access_key }}
        mode: "0600"

    - name: Add entry to /etc/fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        line: "{{ s3_bucket_name }} {{ mount_point }} fuse.s3fs _netdev,allow_other,use_path_request_style,url={{ s3_endpoint }} 0 0"
        state: present

    - name: Mount the S3 bucket
      ansible.builtin.command: mount -a
