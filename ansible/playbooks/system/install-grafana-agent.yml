---
- name: Install Grafana Agent
  hosts: all
  become: true

  vars:
    grafana_cloud_api_key: "{{ lookup('env', 'GRAFANA_CLOUD_API_KEY') | default('')}}"
    metrics_username: "{{ lookup('env', 'GRAFANA_METRIC_USERNAME') | default('')}}" # Example - 825019
    logs_username: "{{ lookup('env', 'GRAFANA_LOG_USERNAME') | default('')}}" # Example - 411478
    prometheus_url: "{{ lookup('env', 'GRAFANA_PROM_URL') | default('')}}"
    loki_url: "{{ lookup('env', 'GRAFANA_LOKI_URL') | default('')}}"
  tasks:
    - name: Validate required env vars
      ansible.builtin.assert:
        that:
          - grafana_cloud_api_key | length > 0
          - metrics_username | length > 0
          - logs_username | length > 0
          - prometheus_url | length > 0
          - loki_url | length > 0
        fail_msg: "Required environment variables are not set. Check that GRAFANA_CLOUD_API_KEY, GRAFANA_METRIC_USERNAME, GRAFANA_LOG_USERNAME, GRAFANA_PROM_URL, and GRAFANA_LOKI_URL are defined."

    - name: Install Grafana Agent
      ansible.builtin.include_role:
        name: grafana.grafana.grafana_agent
      vars:
        grafana_agent_metrics_config:
          configs:
            - name: integrations
              remote_write:
                - basic_auth:
                    password: "{{ grafana_cloud_api_key }}"
                    username: "{{ metrics_username }}"
                  url: "{{ prometheus_url }}"

          global:
            scrape_interval: 60s
          wal_directory: /tmp/grafana-agent-wal
        grafana_agent_logs_config:
          configs:
            - name: default
              clients:
                - basic_auth:
                    password: "{{ grafana_cloud_api_key }}"
                    username: "{{ logs_username }}"
                  url: "{{ loki_url }}"
              positions:
                filename: /tmp/positions.yaml
              target_config:
                sync_period: 10s
              scrape_configs:
                - job_name: varlogs
                  static_configs:
                    - targets: [localhost]
                      labels:
                        instance: ${HOSTNAME:-default}
                        job: varlogs
                        __path__: /var/log/*log
        grafana_agent_integrations_config:
          node_exporter:
            enabled: true
            instance: ${HOSTNAME:-default}
          prometheus_remote_write:
            - basic_auth:
                password: "{{ grafana_cloud_api_key }}"
                username: "{{ metrics_username }}"
              url: "{{ prometheus_url }}"
        grafana_agent_env_vars:
          HOSTNAME: "%H"

    - name: Find log files
      ansible.builtin.find:
        paths: /var/log
        patterns: "*log"
      register: log_files

    - name: Permit Grafana Agent to read logs
      ansible.posix.acl:
        path: "{{ item.path }}"
        entity: grafana-agent
        etype: user
        permissions: r
        state: present
      loop: "{{ log_files.files }}"
