---
- name: Install Docker
  hosts: all
  become: true

  tasks:
    - name: Download Docker convenience script
      ansible.builtin.get_url:
        url: https://get.docker.com
        dest: /tmp/get-docker.sh

    - name: Run Docker convenience script
      ansible.builtin.command: sh /tmp/get-docker.sh
      args:
        creates: /usr/bin/docker

    - name: Add current user to the Docker group
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true

    - name: Update daemon.json
      ansible.builtin.import_role:
        name: json_modifier
      vars:
        json_file_path: /etc/docker/daemon.json
        modifier: add
        additional_content:
          default-network-opts:
            bridge:
              com.docker.network.driver.mtu: "1280"
            overlay:
              com.docker.network.driver.mtu: "1280"

    - name: Restart Docker service
      ansible.builtin.service:
        name: docker
        state: restarted

    - name: Remove docker_gwbridge network if it exists
      ansible.builtin.command: docker network rm docker_gwbridge
      register: result
      failed_when:
        - result.rc != 0
        - '"network docker_gwbridge not found" not in result.stderr'

    - name: Create docker_gwbridge network with specified options
      ansible.builtin.shell: >
        docker network create --driver bridge
        --opt com.docker.network.driver.mtu=1280
        --opt com.docker.network.bridge.enable_ip_masquerade=true
        --opt com.docker.network.bridge.name=docker_gwbridge
        docker_gwbridge
