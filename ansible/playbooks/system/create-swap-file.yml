---
- name: Create Swap File
  hosts: all
  become: true

  vars_prompt:
    - name: swap_file_size_mb
      prompt: "Enter the size of the swap file in megabytes"
      private: false  # Setting to yes hides the input (useful for sensitive information)

  tasks:
    - name: Define variables
      ansible.builtin.set_fact:
        swap_file_path: "/swapfile"

    - name: Validate swap file size
      ansible.builtin.assert:
        that:
          - swap_file_size_mb | int > 0
          - swap_file_size_mb | int < 65536
        fail_msg: "Swap file size must be between 1 and 65535 MB"

    - name: Create swap file
      ansible.builtin.command: "fallocate -l {{ swap_file_size_mb }}M {{ swap_file_path }}"
      args:
        creates: "{{ swap_file_path }}"
      register: swap_file_created

    - name: Set permissions for swap file
      ansible.builtin.command: "chmod 600 {{ swap_file_path }}"
      when: swap_file_created.changed

    - name: Set up swap space
      ansible.builtin.command: "mkswap {{ swap_file_path }}"
      when: swap_file_created.changed

    - name: Enable swap
      ansible.builtin.command: "swapon {{ swap_file_path }}"
      when: swap_file_created.changed

    - name: Add swap entry to /etc/fstab
      ansible.builtin.lineinfile:
        path: "/etc/fstab"
        line: "{{ swap_file_path }} none swap sw 0 0"
        state: present
      when: swap_file_created.changed
