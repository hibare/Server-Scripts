---
- name: Uninstall S3 bucket mount
  hosts: media
  become: true
  vars:
    s3_bucket_name: "{{ lookup('env', 'S3_MEDIA_BUCKET') | default('') }}"
    s3_endpoint: "{{ lookup('env', 'S3_MEDIA_ENDPOINT') | default('') }}"
    mount_point: "/mnt/s3/media"
    s3fs_config_file: "/etc/passwd-s3fs"

  tasks:
    - name: Validate required env vars
      ansible.builtin.assert:
        that:
          - s3_bucket_name | length > 0
          - s3_endpoint | length > 0
        fail_msg: "Required environment variables are not set. Check that S3_MEDIA_BUCKET and S3_MEDIA_ENDPOINT are defined."

    - name: Unmount the S3 bucket
      ansible.builtin.command: umount "{{ mount_point }}"
      ignore_errors: true # Ignore errors if the mount point is not mounted

    - name: Remove entry from /etc/fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        state: absent
        line: "{{ s3_bucket_name }} {{ mount_point }} fuse.s3fs _netdev,allow_other,use_path_request_style,url={{ s3_endpoint }} 0 0"

    - name: Remove the s3fs credentials file
      ansible.builtin.file:
        path: "{{ s3fs_config_file }}"
        state: absent

    - name: Remove the mount point directory
      ansible.builtin.file:
        path: "{{ mount_point }}"
        state: absent

    - name: Uninstall s3fs package
      ansible.builtin.package:
        name: s3fs
        state: absent
