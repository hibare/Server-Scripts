---
- name: Setup update notifier
  hosts: all
  become: true

  vars:
    script_url: "{{ lookup('env', 'UPDATE_NOTIFIER_SCRIPT_SOURCE') | default('') }}"
    script_dest: "{{ lookup('env', 'SCRIPTS_DESTINATION') | default('') }}"
    cron_minute: "30"
    cron_hour: "23"
    cron_job: "bash {{ script_dest }}/update_notifier.sh"

  tasks:
    - name: Validate required env vars
      ansible.builtin.assert:
        that:
          - script_url | length > 0
          - script_dest | length > 0
        fail_msg: "Required environment variables are not set. Check that UPDATE_NOTIFIER_SCRIPT_SOURCE and SCRIPTS_DESTINATION are defined."

    - name: Ensure the destination directory exists
      ansible.builtin.file:
        path: "{{ script_dest }}"
        state: directory

    - name: Load script if not present or updated
      ansible.builtin.get_url:
        url: "{{ script_url }}"
        dest: "{{ script_dest }}/update_notifier.sh"
        mode: '0755'

    - name: Add a cronjob to run the script
      ansible.builtin.cron:
        name: "Run the script every day"
        minute: "{{ cron_minute }}"
        hour: "{{ cron_hour }}"
        job: "{{ cron_job }}"
        user: "root"
        state: present
