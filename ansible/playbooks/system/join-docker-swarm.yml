---
- name: Join Docker swarm
  hosts: agents
  become: true

  vars_prompt:
    - name: swarm_token
      prompt: "Enter Docker swarm worker join token"
      private: true

    - name: swarm_manager_ip
      prompt: "Enter Docker swarm manager IP"
      private: false

  tasks:
    - name: Validate swarm join parameters
      ansible.builtin.assert:
        that:
          - swarm_token | length > 0
          - swarm_manager_ip | length > 0
        fail_msg: "Swarm token and manager IP must be provided"

    - name: Install UFW
      ansible.builtin.apt:
        name: ufw
        state: present

    - name: Enable UFW
      community.general.ufw:
        state: enabled

    - name: Allow TCP traffic on port 2377 from 100.64.0.0/10 on tailscale0
      community.general.ufw:
        rule: allow
        direction: in
        interface: tailscale0
        from_ip: 100.64.0.0/10
        proto: tcp
        to_port: "2377"

    - name: Allow TCP traffic on port 7946 from 100.64.0.0/10 on tailscale0
      community.general.ufw:
        rule: allow
        direction: in
        interface: tailscale0
        from_ip: 100.64.0.0/10
        to_port: "7946"

    - name: Allow UDP traffic on port 4789 from 100.64.0.0/10 on tailscale0
      community.general.ufw:
        rule: allow
        direction: in
        interface: tailscale0
        from_ip: 100.64.0.0/10
        proto: udp
        to_port: "4789"

    - name: Allow TCP traffic on port 2377 from fd7a:115c:a1e0:ab12::/64 on tailscale0
      community.general.ufw:
        rule: allow
        direction: in
        interface: tailscale0
        from_ip: "fd7a:115c:a1e0:ab12::/64"
        proto: tcp
        to_port: "2377"

    - name: Allow TCP traffic on port 7946 from fd7a:115c:a1e0:ab12::/64 on tailscale0
      community.general.ufw:
        rule: allow
        direction: in
        interface: tailscale0
        from_ip: "fd7a:115c:a1e0:ab12::/64"
        to_port: "7946"

    - name: Allow UDP traffic on port 4789 from fd7a:115c:a1e0:ab12::/64 on tailscale0
      community.general.ufw:
        rule: allow
        direction: in
        interface: tailscale0
        from_ip: "fd7a:115c:a1e0:ab12::/64"
        proto: udp
        to_port: "4789"

    - name: Allow all inbound traffic on tailscale0
      community.general.ufw:
        rule: allow
        interface: tailscale0
        direction: in

    - name: Reload UFW
      community.general.ufw:
        state: reloaded

    - name: Join Swarm as Worker
      community.docker.docker_swarm:
        state: join
        join_token: "{{ swarm_token }}"
        remote_addrs:
          - "{{ swarm_manager_ip }}:2377"
